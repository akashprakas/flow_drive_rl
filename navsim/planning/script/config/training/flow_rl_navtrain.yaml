hydra:
  run:
    dir: ${output_dir}
  output_subdir: ${output_dir}/code/hydra
  searchpath:
    - pkg://navsim.planning.script.config.common
  job:
    chdir: False

defaults:
  - default_common
  - default_evaluation
  - default_train_val_test_log_split
  - agent: flow_rl_agent
  - override train_test_split: navtrain
  - _self_

experiment_name: flow_rl_navtrain
seed: 0

# Pretrained DiffusionDrive checkpoint (88.1 PDMS on navsim)
agent:
  checkpoint_path: ${oc.env:NAVSIM_DEVKIT_ROOT}/ckpts/diffusiondrive_navsim_88p1_PDMS/diffusiondrive_navsim_88p1_PDMS

# Dataset — use pre-built training_cache (103K tokens, built by build_navtrain_cache.sh)
cache_path: ${oc.env:NAVSIM_EXP_ROOT}/training_cache
metric_cache_path: ${oc.env:NAVSIM_EXP_ROOT}/metric_cache
force_cache_computation: false
use_cache_without_dataset: true

# Dataloader
dataloader:
  params:
    batch_size: 32
    num_workers: 4
    pin_memory: true
    prefetch_factor: 2

# Trainer — 2 epochs with per-epoch checkpointing via ModelCheckpoint in FlowRLAgent
trainer:
  params:
    max_epochs: 2
    check_val_every_n_epoch: 1
    val_check_interval: 1.0
    limit_train_batches: 1.0
    limit_val_batches: 1.0
    accelerator: gpu
    strategy: auto
    precision: 16-mixed
    num_nodes: 1
    num_sanity_val_steps: 0
    fast_dev_run: false
    accumulate_grad_batches: 1
    gradient_clip_val: 1.0
    gradient_clip_algorithm: norm
    default_root_dir: ${output_dir}
